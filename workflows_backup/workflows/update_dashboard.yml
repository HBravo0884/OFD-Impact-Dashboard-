name: Automate Dashboard Data Pipeline

on:
  push:
    branches:
      - main
    paths:
      # Only run this pipeline if a CSV or XLSX dataset is uploaded, or if the python script is edited
      - '**/*.csv'
      - '**/*.xlsx'
      - 'preprocess.py'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Needs permissions to commit the processed changes back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10 Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Data Processing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Autonomous Pipeline (preprocess.py)
        run: |
          python3 preprocess.py
          
      - name: Commit and Push Updated Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the generated artifacts that need to be saved
          git add hucm_ofd_dashboard.html final_payload.json index.html all_final.pkl missing_metadata_profiles.csv || true
          
          # We check if there are changes to avoid failing the pipeline if no files actually changed
          git diff --staged --quiet || git commit -m "🤖 Auto-deployed dashboard update & digested new Zoom records"
          
          git push
